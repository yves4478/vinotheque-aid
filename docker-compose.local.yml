services:
  db:
    image: postgres:16-alpine
    container_name: vinotheque-local-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: vinotheque_dev
      POSTGRES_USER: vinotheque
      POSTGRES_PASSWORD: vinotheque
    ports:
      - "5433:5432"
    volumes:
      - vinotheque_local_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vinotheque -d vinotheque_dev"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  vinotheque_local_pgdata:
